# =============================================================================
# Unified Pipeline Configuration
# =============================================================================
# Joint LME + LGCM Analysis: Cardiovascular Risk and Hippocampal-Cognitive
# Coupling in Preclinical Alzheimer's Disease
#
# Target: Alzheimer's & Dementia
# =============================================================================

# -----------------------------------------------------------------------------
# General Settings
# -----------------------------------------------------------------------------
general:
  project_name: hvr-frs-adni
  random_seed: 1618
  log_level: INFO
  n_cores: 4

# -----------------------------------------------------------------------------
# Directory Structure (relative to project root)
# -----------------------------------------------------------------------------
paths:
  data:
    raw: data/raw
    external: data/external
    derivatives: data/derivatives
  models:
    fits: models/fits
    results: models/results
  outputs:
    figures: outputs/figures
    tables: outputs/tables
  reports: reports-src
  manuscript: manuscript

# -----------------------------------------------------------------------------
# Data Files
# -----------------------------------------------------------------------------
data:
  # Raw data sources
  raw:
    adsp_phc: data/raw/adsp_phc
    adni: data/raw/adni
    # Preprocessing inputs (script 01)
    adni_vols: data/raw/adni/vols_hcvc_adni.csv
    adni_icc: data/raw/adni/adni_icc.csv
    apoe: data/raw/adni/ADNI_APOERES_14Jan2026.csv
    # ADSP-PHC data files (date suffix may change with updates)
    adsp_phc_amyloid: data/raw/adsp_phc/ADSP_PHC_PET_Amyloid_Simple_11Dec2025.csv
    adsp_phc_cognition: data/raw/adsp_phc/ADSP_PHC_COGN_11Dec2025.csv
    adsp_phc_tau: data/raw/adsp_phc/ADSP_PHC_PET_Tau_Detailed_11Dec2025.csv
    adsp_phc_biomarker: data/raw/adsp_phc/ADSP_PHC_BIOMARKER_11Dec2025.csv
    adsp_phc_cvrf: data/raw/adsp_phc/ADSP_PHC_CVRF_11Dec2025.csv
    # Raw ADNI CVR variables (direct from LONI IDA)
    adni_cvr_vars: data/raw/cvr_adni_vars_10Feb2026.csv
    adni_labdata: data/raw/All_Subjects_LABDATA_05Feb2026.csv

  # External reference data
  external:
    gamlss_models: data/external/gamlss.rds
    adnimerge: data/ADNIMERGE_0.0.1.tar.gz

  # Output directories (used by reporting scripts)
  outputs:
    base_dir: outputs
    tables_dir: outputs/tables
    figures_dir: outputs/figures

  # Derived datasets (generated by pipeline)
  derivatives:
    # Preprocessing outputs (script 01 → script 02+)
    adni_age: data/derivatives/adni_age_calculated.rds
    adni_hchvr: data/derivatives/adni_hc-hvr_adj.rds
    # Shared
    z_scores: data/derivatives/adni_z-scores.rds
    normative_transfer_validation: data/derivatives/normative_transfer_validation.rds
    # LME directory
    lme_dir: data/derivatives/lme
    # LME-specific
    lme_cohort_hvr: data/derivatives/lme/cohort_hvr.rds
    tau_power_info: data/derivatives/lme/tau_power_info.rds
    # LGCM-specific
    lgcm_dir: data/derivatives/lgcm
    lgcm_input_full: data/derivatives/lgcm/lgcm_input_full.rds
    lgcm_input_male: data/derivatives/lgcm/lgcm_input_male.rds
    lgcm_input_female: data/derivatives/lgcm/lgcm_input_female.rds


  # Model output paths (accessed via get_data_path)
  # NAMING CONVENTION:
  #   Scripts 05-06 save merged FRS+CVR results in single files.
  #   Script 07 saves raw-measure sensitivity + attrition + EDT.
  #   Script 10 saves merged mediation results (both predictors).
  models:
    results_dir: models/results/lme
    lme_results_dir: models/results/lme
    lgcm_results_dir: models/results/lgcm
    fits_dir: models/fits
    diagnostics:
      zscore: models/diagnostics/zscore.rds
    # --- FRS Analysis (script 04) ---
    frs_problem_analysis: models/results/lme/frs_problem_analysis.rds
    frs_validity_stats: data/derivatives/lme/frs_validity_stats.rds
    # --- CVR Latent Factor (scripts 05-07) ---
    cvr_mimic_model: models/results/lme/cvr_mimic_model.rds
    cvr_mimic_specification: models/results/lme/cvr_mimic_specification.rds
    cvr_measurement_invariance: models/results/lme/cvr_measurement_invariance.rds
    cvr_mimic_scores: data/derivatives/lme/cvr_mimic_scores.rds
    # --- LME Results (scripts 08-09, both FRS + CVR_mimic) ---
    lme_hvr_z: models/results/lme/lme_hvr_z_results.rds
    lme_hc_z: models/results/lme/lme_hc_z_results.rds
    # --- LME Sensitivity (script 10) ---
    lme_raw_sensitivity: models/results/lme/lme_raw_sensitivity_results.rds
    attrition_analysis: models/results/lme/attrition_analysis.rds
    edt_linearity_test: models/results/lgcm/edt_linearity_test.rds
    edt_early_middle_sensitivity: models/results/lme/edt_early_middle_sensitivity.rds
    # --- LME EDT supplementary ---
    lme_edt_hvr_z: models/results/lme/lme_edt_hvr_z_results.rds
    lme_edt_hc_z: models/results/lme/lme_edt_hc_z_results.rds
    lme_edt_hvr_z_frs: models/results/lme/lme_edt_hvr_z_frs_results.rds
    lme_edt_hvr_z_cvr: models/results/lme/lme_edt_hvr_z_cvr_results.rds
    # --- LGCM Results (scripts 12-14) ---
    lgcm_parallel: models/results/lgcm/lgcm_parallel_results.rds
    lgcm_quadratic_attempt: models/results/lgcm/lgcm_quadratic_attempt.rds
    lgcm_mediation: models/results/lgcm/lgcm_mediation_results.rds
    lgcm_mediation_checkpoints: models/results/lgcm/mediation_checkpoints
    lgcm_quadratic_attempts: models/results/lgcm/lgcm_frs_quadratic_attempts.rds
    lgcm_invariance_tests: models/results/lgcm/lgcm_invariance_tests.rds
    simulation_results: models/results/lgcm/simulation_results.rds

# -----------------------------------------------------------------------------
# Analysis Parameters
# -----------------------------------------------------------------------------
parameters:
  # Head-size adjustment methods for z-score computation
  # RES = residual adjustment, PRP = proportional adjustment
  adjustment_methods:
    - RES
    - PRP

  # Cognitive domains
  cognitive_domains:
    - MEM
    - LAN
    - EXF

  domain_labels:
    MEM: Memory
    LAN: Language
    EXF: Executive Function

  # ADSP-PHC cognitive measures
  phc_measures:
    MEM:
      score: PHC_MEM
      se: PHC_MEM_SE
      filter: PHC_MEM_PreciseFilter
    LAN:
      score: PHC_LAN
      se: PHC_LAN_SE
      filter: PHC_LAN_PreciseFilter
    EXF:
      score: PHC_EXF
      se: PHC_EXF_SE
      filter: PHC_EXF_PreciseFilter

  # Biomarker thresholds
  amyloid:
    column: PHC_CENTILOIDS
    centiloid_threshold: 25  # Centiloids for Aβ+ classification

  tau:
    column: META_TEMPORAL_SUVR

  # Cardiovascular risk
  frs:
    column: PHC_ASCVD_10y_FRS_Simple_Ageover30
    # Age range for FRS validity (30-62 years)
    valid_age_min: 30
    valid_age_max: 62
    tertile_labels:
      - Low
      - Medium
      - High

  # CV Risk PC1 (sensitivity analysis - no ceiling effect)
  cvrf_pc1:
    column: PHC_PC1_All
    description: "Principal component of all CV risk factors (no ceiling)"

  # CVR MIMIC (primary CVR latent measure, age-adjusted)
  cvr_mimic:
    column: CVR_mimic
    source: data/derivatives/lme/cvr_mimic_scores.rds
    description: "Age-adjusted latent CVR from MIMIC model"
    indicators:
      continuous: [SBP_z, GLUCOSE_z, CHOL_z, CREAT_z]
      binary: [HTN]

  # APOE genotype
  apoe:
    file: data/raw/adni/ADNI_APOERES_14Jan2026.csv
    genotype_column: GENOTYPE
    # APOE4 carrier status: any allele = 4
    e4_alleles: [4]

  # HVR normalization
  hvr:
    adjustment_method: NON  # No adjustment (ratio inherently normalizes head-size)
    rois:
      HC: Hippocampus
      LV: Lateral Ventricles
      HVR: Hippocampus-to-Ventricle Ratio

  # Disease time / EDT (Estimated Distance to Dementia)
  disease_time:
    method: progmod  # Raket (2020) disease progression model
    basis: simultaneous_adas_mmse  # Simultaneous ADAS-Cog 13 + MMSE (Kühnel et al., 2021)
    source: ADNI_disease_stage_bl  # Pre-computed from progmod package (if multivariate fails)
    fallback: precomputed  # Pre-computed univariate if simultaneous model fails
    note: Simultaneous model with shared disease time random effect
    reference: "Kühnel et al., Stat Med 2021. doi:10.1002/sim.8932"
    refit: false  # Set to false to use cached model (30min fitting otherwise)
    cache_path: data/derivatives/progmod_multivariate_fit.rds
    # EDT stratification uses tertiles (Early/Middle/Late), not fixed thresholds

  # Precision filtering
  precision:
    se_threshold: 0.6  # SE ≤ 0.6 for inclusion

# -----------------------------------------------------------------------------
# LME Model Settings
# -----------------------------------------------------------------------------
lme:
  estimator: REML
  optimizer: bobyqa
  max_iter: 100000

  # Three-model tau control strategy
  tau_control:
    enabled: true
    models:
      M1: "Full sample, no tau"
      M2: "Tau subsample, FRS×TAU (negative control)"
      M3: "Tau subsample, FRS×HVR + tau (key test)"

  # Covariates
  covariates:
    - AGE
    - EDUC
    - SEX
    - APOE4

# -----------------------------------------------------------------------------
# LGCM Model Settings
# -----------------------------------------------------------------------------
lgcm:
  # Timepoint configuration
  n_timepoints: 6  # Maximum number of timepoints (T0-T5)

  # OpenMx settings
  optimizer: SLSQP
  missing: fiml

  # EDT centering for numerical stability (NO scaling per user requirement)
  edt_centering:
    enabled: true
    method: center  # Subtract mean only, keep years metric

  # Measurement error methodology
  se_methodology:
    fix_to_se_squared: true  # Key innovation: fix error variance to SE²
    use_observation_specific: true

  # Multi-group invariance testing
  invariance:
    groups: [Male, Female]
    sequence: [configural, metric, scalar, structural]
    criteria:
      delta_cfi: 0.01
      delta_rmsea: 0.015

  # Mediation analysis
  mediation:
    method: sobel  # or 'bootstrap'
    bootstrap_samples: 5000

  # Bootstrap confidence intervals
  # Disabled by default - enable after evaluating model convergence
  bootstrap:
    enabled: false
    n_replications: 1000

  # Refit control - set to true to refit models (needed after HVR change)
  refit:
    univariate: true     # Script 11: univariate growth models
    parallel: true       # Script 12: parallel process models
    multigroup: true     # Script 13: multi-group invariance models

  # Fit indices thresholds
  fit_thresholds:
    cfi: 0.95
    tli: 0.95
    rmsea: 0.06
    srmr: 0.08

# -----------------------------------------------------------------------------
# Output Settings
# -----------------------------------------------------------------------------
output:
  tables:
    formats:
      - html
      - tex
    digits: 4
    p_digits: 4
    # Main text tables
    names:
      table1: table1_demographics
      table2: table2_three_model
    # Supplementary tables
    supplementary:
      stable1: table_s1_full_coefficients
      stable2: table_s2_four_way
      stable3: table_s3_edt_sensitivity
      stable4: table_s4_power

  figures:
    dpi: 300           # 300 DPI is sufficient for print quality
    width: 7.5         # Full page width for A&D journal
    height: 5          # Fits on one page
    panel_width: 6     # Individual panels
    panel_height: 4
    formats:
      - pdf
      - png
      - tiff
    # Main text figures
    names:
      fig1: figure1_combined  # Forest + Heatmap
      fig2: figure2_combined  # Trajectories + Mediation
    # Supplementary figures
    supplementary:
      sfig1: figure_s1  # CONSORT
      sfig2: figure_s2  # Spaghetti plots
      sfig3: figure_s3  # Diagnostics
      sfig4: figure_s4  # DAG

  manuscript:
    # A&D limits
    max_tables_figures: 5
    max_words: 5000
    max_references: 75

# -----------------------------------------------------------------------------
# Script Execution Control
# -----------------------------------------------------------------------------
scripts:
  force_regenerate:
    preprocess_volumes: false # 01_preprocess_volumes.R
    compute_zscores: false    # 02_compute_zscores.R
    prepare_data: false       # 03_prepare_analysis_data.R
    frs_analysis: false       # 04_frs_problem_analysis.R
    cvr_mimic: false          # 05_cvr_mimic_model.R
    cvr_invariance: false     # 06_cvr_measurement_invariance.R
    cvr_scores: false         # 07_cvr_score_extraction.R
    lme_hvr: false            # 08_lme_hvr_z.R
    lme_hc: false             # 09_lme_hc_z.R
    lme_sensitivity: false    # 10_lme_sensitivity.R
    prepare_lgcm: false       # 11_prepare_lgcm_data.R
    lgcm_models: false        # 12_lgcm_parallel.R
    lgcm_mediation: false     # 13_lgcm_mediation.R
    simulation_study: false   # 14_lgcm_simulation.R
    figures_tables: false     # 15_prepare_manuscript_env.R

# -----------------------------------------------------------------------------
# Required Packages
# -----------------------------------------------------------------------------
packages:
  required:
    - here
    - data.table
    - yaml
    - lubridate
    - progress
    - gamlss
    - gamlss.add
    - lme4
    - lmerTest
    - OpenMx
    - ggplot2
    - patchwork
    - gt
    - ADNIMERGE
  optional:
    - lavaan
    - tidySEM
    - gtsummary
    - ggtext
